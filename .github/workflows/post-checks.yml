name: Post-checks

on:
  workflow_run:
    workflows: [ "Tests" ]
    branches: [ "main", "master" ]
    types: [ completed ]
  workflow_dispatch:
    inputs:
      run_id:
        description: 'Tests workflow run ID to pull allure-results from'
        required: false

permissions:
  contents: read
  pages: write
  id-token: write
  actions: read

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  report:
    name: Generate & Deploy Allure Report
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event.workflow_run.conclusion == 'failure' }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Download merged allure results
        uses: actions/download-artifact@v4
        with:
          name: allure-results
          path: allure-results/
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Checkout gh-pages for history
        uses: actions/checkout@v4
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages

      - name: Restore Allure history
        run: |
          if [ -d gh-pages/history ]; then
            mkdir -p allure-results/history
            cp -R gh-pages/history/. allure-results/history/
          fi

      - name: Generate Allure report
        run: npx --yes allure-commandline generate allure-results --clean -o allure-report

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: allure-report

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
